<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Arka plan: koyu lacivert kalkan -->
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a6c"/>
      <stop offset="100%" style="stop-color:#0d1b4b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c6ff"/>
      <stop offset="100%" style="stop-color:#0072ff"/>
    </linearGradient>
  </defs>

  <!-- Kalkan gövdesi -->
  <path d="M64 6 L110 26 L110 68 C110 94 88 114 64 122 C40 114 18 94 18 68 L18 26 Z"
        fill="url(#shieldGrad)" stroke="#0072ff" stroke-width="3"/>

  <!-- İç parlama hattı -->
  <path d="M64 16 L102 32 L102 68 C102 90 84 108 64 115 C44 108 26 90 26 68 L26 32 Z"
        fill="none" stroke="#00c6ff" stroke-width="1" opacity="0.4"/>

  <!-- Ağ/web sembolü: yatay çizgiler -->
  <ellipse cx="64" cy="66" rx="28" ry="28" fill="none" stroke="url(#accentGrad)" stroke-width="2.5"/>
  <ellipse cx="64" cy="66" rx="14" ry="28" fill="none" stroke="url(#accentGrad)" stroke-width="2"/>
  <line x1="36" y1="66" x2="92" y2="66" stroke="url(#accentGrad)" stroke-width="2"/>
  <line x1="38" y1="54" x2="90" y2="54" stroke="url(#accentGrad)" stroke-width="1.5"/>
  <line x1="38" y1="78" x2="90" y2="78" stroke="url(#accentGrad)" stroke-width="1.5"/>

  <!-- Kilit ikonu ortada (güvenlik vurgusu) -->
  <rect x="57" y="63" width="14" height="12" rx="2" fill="#00c6ff" opacity="0.9"/>
  <path d="M59 63 L59 59 C59 55.7 69 55.7 69 59 L69 63" fill="none" stroke="#00c6ff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- "CYB" yazısı altında -->
  <text x="64" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold"
        font-size="8" fill="#00c6ff" letter-spacing="1">CaYaBlockWeb</text>
</svg>
