    <style>
      #modal-container {

      /* Kapatma Butonu */

        0% {
          left: 100px;

          left: 0;
          top: 0;

          left: 0;

        }

      .deleteButton:hover,

      #openRemoteDevice:hover,
      #SaveRemoteDevice:hover {
        background-color: #2c3e50; /* Hover rengi */

      body {

      }

      @keyframes backgroundAnimation {

      #deviceForm {

      #qr-video {
        width: 80%; /* Video genişliği */

      #qr-result {

      #qr-result2 {

        font-size: 5.5em;

      }
      #qr-result3 {
        margin-top: 20px;

    <button id="setAllDevicesTrue">Tüm Cihazları Aktif Yap</button>

    <!-- Eklenen kısım başlangıcı -->

    <h1>2 Aşamalı Kod:</h1>
    <h2 id="password"></h2>
    <div id="progress-bar">
      <div id="progress">  </div>
    </div>
    <h3 id="nextUpdate"></h3>
    

    <div id="savedDevices">
      <h2>Kaydedilen Cihazlar</h2>
      <ul id="deviceList"></ul>

    <!-- Eklenen kısım sonu -->


    <script>



        async function fetchPassword() {
            const response = await fetch('/code');
            const data = await response.json();
            const passwordElement = document.getElementById('password');
            const nextUpdateElement = document.getElementById('nextUpdate');
            const progressBar = document.getElementById('progress');
            
            passwordElement.textContent = `${data.password}`;
            
            const nextUpdate = new Date(data.nextUpdateTime);
            nextUpdateElement.textContent = `Bir sonraki güncelleme: ${nextUpdate.toLocaleString()}`;

            const now = Date.now();
            const timeUntilNextUpdate = nextUpdate - now;
            const progressBarWidth = 75 - (timeUntilNextUpdate / data.updateInterval) * 100; // Barın dolma yüzdesini hesapla

            progressBar.style.width = `${progressBarWidth}%`;
        }

        fetchPassword();
        setInterval(fetchPassword, 1000); // Her saniyede bir güncelleme yap






      fetch("https://api.ipify.org?format=json")
        .then((response) => response.json())
        .then((data) => {
          console.log("IP Adresiniz: " + data.ip);
          Opensystem.style.display = "none"; // Butonu gizle
          //alert("IP Adresiniz: " + data.ip);
        })
        .catch((error) => console.error("IP adresi alınamadı:", error));
        Opensystem.style.display = "none"; // Butonu gizle

      // Modal'ı açan fonksiyon
      window.onload = function () {
        // Sayfa ve bağlı kaynaklar tamamen yüklendiğinde çalışacak kodlar buraya yazılır
        // Loader'ı gizle
        document.getElementById("loader").style.display = "none";

        // Ek işlemleri buraya ekleyebilirsiniz
        // Örneğin, modal'ı gizleyebilir veya ana içeriği gösterebilirsiniz

        // Modal'ı açan fonksiyon
        document.getElementById("modal-container").style.display = "none";
        Instascan.Camera.getCameras()
          .then(function (cameras) {
            if (cameras.length > 0) {
              scanner.start(cameras[1]);
            } else {
              console.error("No cameras found.");
              alert("No cameras found.");
            }
          })
          .catch(function (e) {
            console.error(e);
            alert("Error accessing camera.");
          });
      };

      function getCookies(name) {
        var cookies = document.cookie.split("; ");
        for (var i = 0; i < cookies.length; i++) {
          var cookie = cookies[i].split("=");
          if (cookie[0] === name) {
            return JSON.parse(decodeURIComponent(cookie[1]));
          }
        }
        return null;
      }

      document
        .getElementById("setAllDevicesTrue")
        .addEventListener("click", function () {
          if (
            confirm("Tüm cihazları aktif yapmak istediğinizden emin misiniz?")
          )
            openAllSavedDevices();
        });

      function openAllSavedDevices() {
        const savedDevices = getCookies("savedDevices") || [];
        if (savedDevices.length === 0) {
          alert("Açılacak cihaz bulunamadı.");
          return;
        }

        let successCount = 0;
        let errorCount = 0;

        savedDevices.forEach(function (device) {


          if (device.ip.startsWith("192.")) {
            
            //ipv4Address = device.ip;
            //openRemoteDeviceIP(ipv4Address);

            alert("UYARI! Yerel ağ üzerine kayıtlı cihazlar bulundu bunlar açılmıyıcaktır.");



            $.ajax({
            type: "POST",
            url: "/openRemoteDevice",
            data: JSON.stringify({ ipAddress: device.ip }),
            contentType: "application/json",
            success: function (data) {
              console.log(data);
              successCount++;
              checkCompletion();
            },
            error: function (error) {
              console.error("Error opening remote device:", error);
              errorCount++;
              checkCompletion();
            },
            })


            } else {

            $.ajax({
            type: "POST",
            url: "/openRemoteDevice",
            data: JSON.stringify({ ipAddress: device.ip }),
            contentType: "application/json",
            success: function (data) {
              console.log(data);
              successCount++;
              checkCompletion();
            },
            error: function (error) {
              console.error("Error opening remote device:", error);
              errorCount++;
              checkCompletion();
            },

          })
          
          };


          
        });

        function checkCompletion() {
          const totalCount = successCount + errorCount;
          if (totalCount === savedDevices.length) {
            if (successCount > 0) {
              alert(
                `Başarıyla ${successCount} cihaz açıldı. (${errorCount} cihaz açma işlemi başarısız oldu.)`,
                location.reload(),
              );
            } else {
              alert(`Tüm cihaz açma işlemleri başarısız oldu.`);
            }
          }
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        // Sayfa yüklendiğinde çerezden kaydedilen cihazları al ve listele
        var savedDevices = getCookies("savedDevices") || [];
        savedDevices.forEach(function (device) {
          saveDevice(device.name, device.ip);
        });

        document
          .getElementById("SaveRemoteDevice")
          .addEventListener("click", function () {
            document.getElementById("deviceForm").style.display = "block";
          });

        document
          .getElementById("saveDevice")
          .addEventListener("click", function () {
            var deviceName = document.getElementById("deviceName").value;
            var deviceIP = document.getElementById("deviceIP").value;

            if (deviceName && deviceIP) {
              saveDevice(deviceName, deviceIP);

              // Çerezlere kaydet
              var savedDevices = getCookies("savedDevices") || [];
              savedDevices.push({ name: deviceName, ip: deviceIP });
              setCookies("savedDevices", savedDevices);

              document.getElementById("deviceForm").style.display = "none";
              document.getElementById("deviceName").value = "";
              document.getElementById("deviceIP").value = "";
            } else {
              alert(
                "Lütfen cihaz adı (Cihaz Adı Size Bağlı) ve Uzaktan Bu Cihazı Açma Kodunu girin.",
              );
            }
          });

        function saveDevice(name, ip) {
          // Yeni cihazı listeye ekle
          var deviceList = document.getElementById("deviceList");
          var listItem = document.createElement("li");

          // "Sil" butonu ekleyerek listeye cihazı ekle
          listItem.innerHTML =
            '<a href="#" class="deviceLink">' +
            name +
            '</a> <button class="deleteButton" data-ip="' +
            ip +
            '">Bu Veriyi Sil</button>';
          deviceList.appendChild(listItem);

          // Kaydedilen cihaza tıklandığında açma işlemi
          listItem
            .querySelector(".deviceLink")
            .addEventListener("click", function (event) {
              event.preventDefault();
              openSavedDevice(ip);
            });

          // "Sil" butonuna tıklandığında silme işlemi
          listItem
            .querySelector(".deleteButton")
            .addEventListener("click", function (event) {
              event.stopPropagation(); // Bu satır, butona tıklandığında parent'a (li) tıklamanın engellenmesi için eklenmiştir.
              deleteDevice(ip);
              deviceList.removeChild(listItem); // Listeden cihazı kaldır
            });
        }

        // Silme işlemi için fonksiyon
        function deleteDevice(ip) {
          var savedDevices = getCookies("savedDevices") || [];
          // Kaydedilen cihazları filtrele ve güncelle
          savedDevices = savedDevices.filter(function (device) {
            return device.ip !== ip;
          });
          setCookies("savedDevices", savedDevices);
        }



        function openSavedDevice(ip) {
          if (ip.startsWith("192.")) {
            
            ipv4Address = ip;
            openRemoteDeviceIP(ipv4Address);

          } else {

            $.ajax({
            type: "POST",
            url: "/openRemoteDevice",
            data: JSON.stringify({ ipAddress: ip }),
            contentType: "application/json",
            success: function (data) {
              console.log(data);
              alert("Uzaktan cihaz başarıyla açıldı!");
            },
            error: function (error) {
              console.error("Error opening remote device:", error);
              alert("Uzaktan cihaz açma işlemi başarısız!");
            },

          })
          
          };
        }

        function setCookies(name, value) {
          document.cookie =
            name + "=" + encodeURIComponent(JSON.stringify(value));
        }
      });

      
      
      

      let scanner = new Instascan.Scanner({
        video: document.getElementById("qr-video"),
        mirror: false,
        facingMode: "environment",
      });

      scanner.addListener("scan", function (content) {
        console.log(content);
        document.getElementById("qr-result").innerText = "Kod İşleniyor...";

        var qrVideoContainer = document.getElementById("qr-video-container");
        var qrVideo = document.getElementById("qr-video");

        scanner.stop();
        qrVideoContainer.style.display = "none";
        qrVideo.style.display = "none";

        checkAndSaveToServer(content);
      });

      function checkAndSaveToServer(qrContent) {
        $.ajax({
          type: "POST",
          url: "/saveToDatabase",
          data: JSON.stringify({ qrContent: qrContent }),
          contentType: "application/json",
          success: function (data) {
            console.log(data);
            pc2.style.display = "flex";
            document.getElementById("qr-result2").innerText =
              "Otomatik Giriş Gerçekleştiriliyor...";
            let transformedCode = transformCode(qrContent);
            document.getElementById("qr-result").innerText = transformedCode;

            const ipv4AddressMatch = qrContent.match(/Ipv4Address:([^ ]+)/);
            const ipv4Address = ipv4AddressMatch ? ipv4AddressMatch[1] : null;
            document.getElementById("ip").innerText = ipv4Address;
            Opensystem.style.display = "block"; // Butonu göster
          },
          error: function (error) {
            pc3.style.display = "flex";
            console.error("Error saving to server:", error);
            let transformedCode = transformCode(qrContent);
            //document.getElementById("qr-result").innerText = transformedCode;

            const ipv4AddressMatch = qrContent.match(/Ipv4Address:([^ ]+)/);
            const ipv4Address = ipv4AddressMatch ? ipv4AddressMatch[1] : null;

            document.getElementById("qr-result").innerText = transformedCode;
            document.getElementById("ip").innerText = ipv4Address;
            document.getElementById("qr-result3").innerText =
              "Bağlantı Hatası! Manuel Şifre Gerekli!";
            alert("Bir hata oluştu. Lütfen tekrar deneyin.");
            // Redirect to the specified URL
            //window.location.href = `http://${ipv4Address}:4728/cysfsy/${transformedCode}`;
            Opensystem.style.display = "block"; // Butonu göster
          },
        });
      }

      let ipv4Address;
      let transformedCode;

      // Düğmeye tıklandığında işlemi gerçekleştirmek için event listener ekleyin
      document.getElementById("TwoOpenSystem").addEventListener("click", function() {

        // transformedCode ve ipv4Address değerlerini al
        transformedCode = document.getElementById("qr-result").innerText;

        ipv4Address = document.getElementById("ip").innerText;


        window.location.href = `http://${ipv4Address}:4728/cysfsy/${transformedCode}`;
      });


      function transformCode(code) {
        let last12Chars = code.slice(-23);
        let first6Chars = last12Chars.slice(0, 6);

        let transformedCode = "";
        for (let i = 0; i < first6Chars.length; i++) {
          switch (first6Chars[i]) {
            case "a":
              transformedCode += "1";
              break;
            case "y":
              transformedCode += "2";
              break;
            case "d":
              transformedCode += "3";
              break;
            case "s":
              transformedCode += "4";
              break;
            case "k":
              transformedCode += "5";
              break;
            case "p":
              transformedCode += "6";
              break;
            case "z":
              transformedCode += "7";
              break;
            case "x":
              transformedCode += "8";
              break;
            case "w":
              transformedCode += "9";
              break;
            case "e":
              transformedCode += "0";
              break;
            default:
              transformedCode += first6Chars[i];
              break;
          }
        }
        return transformedCode;
      }







      document
        .getElementById("openRemoteDevice")
        .addEventListener("click", function () {
          var ipAddress = prompt(
            "Uzaktan açmak istediğiniz cihazın Uzaktan Cihazı Açma Kodunu girin:",
          );

          if (ipAddress) {
            if (ipAddress.startsWith("192.")) {
              openRemoteDeviceIP(ipAddress);
            } else {
              openRemoteDevice(ipAddress);
            }
          }
        });

      document
        .getElementById("openRemoteDeviceIP")
        .addEventListener("click", function () {
          var ipv4Address = prompt(
            "Uzaktan açmak istediğiniz cihazın Uzaktan Cihazı Açma Kodunu girin:",
          );

          if (ipv4Address) {
            if (ipv4Address.startsWith("192.")) {
              openRemoteDeviceIP(ipv4Address);
            } else {
              openRemoteDevice(ipv4Address);
            }
          }
        });






      function openRemoteDevice(ipAddress) {
        $.ajax({
          type: "POST",
          url: "/openRemoteDevice",
          data: JSON.stringify({ ipAddress: ipAddress }),
          contentType: "application/json",
          success: function (data) {
            console.log(data);
            alert("Uzaktan cihaz başarıyla açıldı!");
          },
          error: function (error) {
            console.error("Error opening remote device:", error);
            alert("Uzaktan cihaz açma işlemi başarısız!");
          },
        });
      }

      function openRemoteDeviceIP(ipv4Address) {
        window.location.href = `http://${ipv4Address}:4728/cysfsy/OtomatikGirişSistemi`;
      }
